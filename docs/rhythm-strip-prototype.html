<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE Day Rhythm Strip — Titlebar Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      --bg-deep: #080a12;
      --bg-surface: #0c0e18;
      --border: rgba(140,120,255,0.10);
      --gold: #c8a0f0;
      --green: #60d8a8;
      --text-primary: #e8e4f0;
      --text-secondary: #9898b8;
      --text-dim: #606080;
      --authority: #c8a0f0;
      --capacity: #60d8a8;
      --expansion: #e080a0;
      --glass-bg: rgba(16,20,36,0.6);

      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      height: 100vh; width: 100vw; overflow: hidden;
    }
    body.light {
      --bg-deep: #f0eef6;
      --bg-surface: #e8e6f0;
      --border: rgba(100,90,160,0.12);
      --gold: #5a48c0;
      --green: #1a8a60;
      --text-primary: #18162a;
      --text-secondary: #48466a;
      --text-dim: #8886a0;
      --authority: #5a48c0;
      --capacity: #1a8a60;
      --expansion: #c04878;
      --glass-bg: rgba(240,238,246,0.7);
    }

    /* ═══ TITLEBAR — faithful to actual app ═══ */
    .titlebar {
      height: 38px;
      background: rgba(12,14,24,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; color: var(--text-secondary);
      position: relative; z-index: 50;
    }
    body.light .titlebar { background: rgba(240,238,246,0.95); }

    .titlebar-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-weight: 500; letter-spacing: 0.5px; font-size: 11px;
    }
    .titlebar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .chip {
      font-size: 9px; padding: 2px 8px; border-radius: 6px;
      background: rgba(140,120,255,0.08); border: 1px solid rgba(140,120,255,0.15);
      color: var(--gold);
    }
    .coherence-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 9px; color: var(--green);
    }
    .coherence-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.2)} }
    .tbtn {
      font-size: 13px; cursor: pointer; background: none; border: none;
      color: var(--text-secondary); padding: 2px 6px; border-radius: 4px;
    }
    .tbtn:hover { background: rgba(140,120,255,0.1); }

    /* ═══════════════════════════════════════════
       DAY RHYTHM STRIP — the new somatic element
       ═══════════════════════════════════════════ */

    .rhythm-strip {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 0 10px;
      height: 24px;
      margin-right: 6px;
      border-radius: 6px;
      background: rgba(140,120,255,0.04);
      border: 1px solid rgba(140,120,255,0.06);
      cursor: default;
      position: relative;
    }
    body.light .rhythm-strip {
      background: rgba(90,72,192,0.04);
      border-color: rgba(90,72,192,0.08);
    }

    /* Past session dot */
    .rhythm-dot {
      border-radius: 50%;
      opacity: 0.5;
      transition: all 0.8s ease;
      flex-shrink: 0;
    }

    /* Current session — filling ring */
    .rhythm-current {
      position: relative;
      flex-shrink: 0;
    }
    .rhythm-current svg {
      display: block;
      transform: rotate(-90deg);
    }
    .rhythm-current-bg {
      fill: none;
      stroke: rgba(140,120,255,0.1);
    }
    body.light .rhythm-current-bg { stroke: rgba(90,72,192,0.1); }
    .rhythm-current-fill {
      fill: none;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease, stroke 2s ease;
    }
    .rhythm-current-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 3px; height: 3px;
      border-radius: 50%;
      animation: current-breathe 3s ease-in-out infinite;
    }
    @keyframes current-breathe {
      0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
    }

    /* Tooltip */
    .rhythm-strip:hover .rhythm-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
    .rhythm-tooltip {
      position: absolute;
      bottom: -36px; left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: rgba(8,10,18,0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(140,120,255,0.15);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-secondary);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    body.light .rhythm-tooltip { background: rgba(255,255,255,0.95); }

    /* ═══ REST OF MOCK UI ═══ */
    .app-body { display: flex; height: calc(100vh - 38px); }
    .sidebar {
      width: 216px; flex-shrink: 0; padding: 16px 0;
      background: rgba(10,12,20,0.92); backdrop-filter: blur(12px);
      border-right: 1px solid var(--border);
    }
    body.light .sidebar { background: rgba(236,234,244,0.92); }
    .nav-item {
      padding: 8px 20px; font-size: 12px; color: var(--text-secondary);
      font-family: 'Space Grotesk', sans-serif;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-item.on { background: rgba(140,120,255,0.06); color: var(--text-primary); }
    .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    .nav-item.on .nav-dot { background: var(--gold); }
    .content {
      flex: 1; padding: 24px; overflow: auto;
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 16px; align-content: start;
    }
    .card {
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; min-height: 120px;
    }
    .card.w2 { grid-column: span 2; }
    .card-title {
      font-family: 'Space Grotesk'; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-dim); margin-bottom: 14px;
    }
    .line { height: 8px; border-radius: 4px; background: rgba(128,128,128,0.1); margin: 6px 0; }

    /* ═══ CONTROLS ═══ */
    .ctrl {
      position: fixed; top: 52px; right: 12px; z-index: 300;
      background: rgba(8,10,18,0.97); backdrop-filter: blur(16px);
      border: 1px solid rgba(140,120,255,0.2); border-radius: 14px;
      padding: 18px 20px; width: 280px;
      font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: #9898b8;
    }
    body.light .ctrl { background: rgba(255,255,255,0.97); border-color: rgba(100,90,160,0.15); color: #48466a; }
    .ctrl h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #c8a0f0; margin-bottom: 14px; }
    body.light .ctrl h3 { color: #5a48c0; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    .row label { color: #606080; font-size: 10px; }
    .row input[type="range"] { width: 120px; accent-color: #c8a0f0; }
    .row .val { width: 50px; text-align: right; font-family: 'JetBrains Mono'; font-size: 10px; }
    .sep { height: 1px; background: rgba(140,120,255,0.1); margin: 12px 0; }
    .btn {
      width: 100%; padding: 7px; margin-top: 5px;
      background: rgba(140,120,255,0.08); border: 1px solid rgba(140,120,255,0.18);
      border-radius: 8px; color: #c8a0f0; cursor: pointer;
      font-family: 'Space Grotesk'; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .btn:hover { background: rgba(140,120,255,0.18); }
    .btn.go { background: rgba(96,216,168,0.15); border-color: rgba(96,216,168,0.25); color: #60d8a8; }

    .preset-row { display: flex; gap: 4px; margin-top: 8px; }
    .preset-btn {
      flex: 1; padding: 6px 4px; text-align: center;
      background: rgba(140,120,255,0.04); border: 1px solid rgba(140,120,255,0.1);
      border-radius: 6px; color: #606080; cursor: pointer;
      font-family: 'Space Grotesk'; font-size: 9px; text-transform: uppercase;
    }
    .preset-btn:hover { background: rgba(140,120,255,0.1); color: #9898b8; }
    .preset-btn.active { background: rgba(140,120,255,0.12); border-color: rgba(140,120,255,0.25); color: #c8a0f0; }
  </style>
</head>
<body>

  <!-- ═══ TITLEBAR ═══ -->
  <div class="titlebar">
    <div class="titlebar-center">Actualize Coherence Engine</div>
    <div class="titlebar-right">

      <!-- ★ DAY RHYTHM STRIP ★ -->
      <div class="rhythm-strip" id="rhythmStrip">
        <div class="rhythm-tooltip" id="rhythmTooltip">3 sessions · 1h 42m today</div>
      </div>

      <div class="chip">execute</div>
      <div class="coherence-chip">
        <div class="coherence-dot"></div>
        <span>Active</span>
      </div>
      <button class="tbtn" onclick="toggleTheme()">◑</button>
    </div>
  </div>

  <!-- ═══ MOCK UI ═══ -->
  <div class="app-body">
    <div class="sidebar">
      <div class="nav-item on"><div class="nav-dot"></div>Dashboard</div>
      <div class="nav-item"><div class="nav-dot"></div>Chat</div>
      <div class="nav-item"><div class="nav-dot"></div>Terminal</div>
      <div class="nav-item"><div class="nav-dot"></div>Vault</div>
      <div class="nav-item"><div class="nav-dot"></div>People</div>
      <div class="nav-item"><div class="nav-dot"></div>Graph</div>
      <div class="nav-item"><div class="nav-dot"></div>History</div>
      <div class="nav-item"><div class="nav-dot"></div>Artifacts</div>
      <div class="nav-item"><div class="nav-dot"></div>Agents</div>
    </div>
    <div class="content">
      <div class="card w2">
        <div class="card-title">Synthesis</div>
        <div class="line" style="width:70%"></div>
        <div class="line" style="width:50%"></div>
        <div class="line" style="width:85%"></div>
      </div>
      <div class="card">
        <div class="card-title">Velocity</div>
        <div class="line" style="width:60%"></div>
        <div class="line" style="width:40%"></div>
      </div>
      <div class="card">
        <div class="card-title">Outcomes</div>
        <div class="line" style="width:80%"></div>
        <div class="line" style="width:55%"></div>
        <div class="line" style="width:90%"></div>
      </div>
      <div class="card">
        <div class="card-title">State</div>
        <div class="line" style="width:65%"></div>
        <div class="line" style="width:45%"></div>
      </div>
      <div class="card">
        <div class="card-title">Pipeline</div>
        <div class="line" style="width:75%"></div>
        <div class="line" style="width:50%"></div>
      </div>
    </div>
  </div>

  <!-- ═══ CONTROLS ═══ -->
  <div class="ctrl">
    <h3>Day Rhythm Strip</h3>

    <div class="row">
      <label>Past sessions</label>
      <input type="range" id="sPast" min="0" max="8" value="3" oninput="render()">
      <div class="val" id="sPastV">3</div>
    </div>
    <div class="row">
      <label>Current session (min)</label>
      <input type="range" id="sCur" min="0" max="90" value="22" oninput="render()">
      <div class="val" id="sCurV">22m</div>
    </div>

    <div class="sep"></div>

    <div style="font-size:9px;color:#606080;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Presets — feel the difference</div>
    <div class="preset-row">
      <div class="preset-btn" onclick="preset('light')">Light day</div>
      <div class="preset-btn active" onclick="preset('normal')">Normal</div>
      <div class="preset-btn" onclick="preset('heavy')">Heavy</div>
      <div class="preset-btn" onclick="preset('overext')">Overextended</div>
    </div>

    <div class="sep"></div>
    <button class="btn go" id="simBtn" onclick="sim()">▶ Simulate a day</button>
    <button class="btn" onclick="preset('normal')">Reset</button>
  </div>

  <script>
    const strip = document.getElementById('rhythmStrip');
    const tooltip = document.getElementById('rhythmTooltip');
    let isLight = false;
    let simRunning = false;
    let simTimer = null;

    // Triad colors for session dots
    const triadColors = ['#c8a0f0', '#60d8a8', '#e080a0']; // authority, capacity, expansion
    const triadColorsLight = ['#5a48c0', '#1a8a60', '#c04878'];

    function toggleTheme() {
      isLight = !isLight;
      document.body.classList.toggle('light', isLight);
      render();
    }

    function getColors() { return isLight ? triadColorsLight : triadColors; }

    // Generate random past session durations
    function randomDurations(count) {
      const durations = [];
      for (let i = 0; i < count; i++) {
        // Mix of short (5-15), medium (20-40), long (45-80)
        const r = Math.random();
        if (r < 0.3) durations.push(5 + Math.random() * 10);
        else if (r < 0.7) durations.push(20 + Math.random() * 20);
        else durations.push(45 + Math.random() * 35);
      }
      return durations;
    }

    let pastDurations = randomDurations(3);

    function render() {
      const pastCount = +document.getElementById('sPast').value;
      const curMin = +document.getElementById('sCur').value;

      document.getElementById('sPastV').textContent = pastCount;
      document.getElementById('sCurV').textContent = curMin + 'm';

      // Regenerate durations if count changed
      while (pastDurations.length < pastCount) pastDurations.push(10 + Math.random() * 50);
      if (pastDurations.length > pastCount) pastDurations = pastDurations.slice(0, pastCount);

      const colors = getColors();

      // Clear strip (keep tooltip)
      strip.innerHTML = '';

      // Past session dots
      for (let i = 0; i < pastCount; i++) {
        const dur = pastDurations[i];
        const dot = document.createElement('div');
        dot.className = 'rhythm-dot';

        // Size: 4px (short) → 8px (long)
        const size = Math.max(4, Math.min(8, 4 + (dur / 80) * 4));
        // Color cycles through triad
        const color = colors[i % 3];
        // Opacity: recent sessions are brighter
        const opacity = 0.3 + (i / Math.max(1, pastCount - 1)) * 0.4;

        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.background = color;
        dot.style.opacity = opacity;

        strip.appendChild(dot);
      }

      // Current session — filling ring
      if (curMin > 0) {
        const currentEl = document.createElement('div');
        currentEl.className = 'rhythm-current';

        const ringSize = 16;
        const strokeWidth = 2;
        const radius = (ringSize - strokeWidth) / 2;
        const circumference = 2 * Math.PI * radius;
        // Fill: 0→100% over 60 min, capped at 100%
        const fillPct = Math.min(1, curMin / 60);
        const dashOffset = circumference * (1 - fillPct);

        // Color: starts capacity green, shifts to expansion pink as session extends
        const t = Math.min(1, curMin / 60);
        const ringColor = isLight
          ? blendColor('#1a8a60', '#c04878', t)
          : blendColor('#60d8a8', '#e080a0', t);

        currentEl.innerHTML = `
          <svg width="${ringSize}" height="${ringSize}" viewBox="0 0 ${ringSize} ${ringSize}">
            <circle class="rhythm-current-bg"
              cx="${ringSize/2}" cy="${ringSize/2}" r="${radius}"
              stroke-width="${strokeWidth}" />
            <circle class="rhythm-current-fill"
              cx="${ringSize/2}" cy="${ringSize/2}" r="${radius}"
              stroke="${ringColor}" stroke-width="${strokeWidth}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${dashOffset}" />
          </svg>
          <div class="rhythm-current-center" style="background:${ringColor}"></div>
        `;

        strip.appendChild(currentEl);
      }

      // Tooltip
      const totalMin = pastDurations.slice(0, pastCount).reduce((a, b) => a + b, 0) + curMin;
      const hours = Math.floor(totalMin / 60);
      const mins = Math.round(totalMin % 60);
      const timeStr = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
      const sessCount = pastCount + (curMin > 0 ? 1 : 0);

      const newTooltip = document.createElement('div');
      newTooltip.className = 'rhythm-tooltip';
      newTooltip.textContent = `${sessCount} session${sessCount !== 1 ? 's' : ''} · ${timeStr} today`;
      strip.appendChild(newTooltip);
    }

    function blendColor(hex1, hex2, t) {
      const r1 = parseInt(hex1.slice(1,3), 16), g1 = parseInt(hex1.slice(3,5), 16), b1 = parseInt(hex1.slice(5,7), 16);
      const r2 = parseInt(hex2.slice(1,3), 16), g2 = parseInt(hex2.slice(3,5), 16), b2 = parseInt(hex2.slice(5,7), 16);
      const r = Math.round(r1 + (r2 - r1) * t);
      const g = Math.round(g1 + (g2 - g1) * t);
      const b = Math.round(b1 + (b2 - b1) * t);
      return `rgb(${r},${g},${b})`;
    }

    function preset(name) {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      event.target?.classList?.add('active');

      if (simRunning) sim(); // stop

      switch(name) {
        case 'light':
          document.getElementById('sPast').value = 1;
          document.getElementById('sCur').value = 12;
          pastDurations = [15];
          break;
        case 'normal':
          document.getElementById('sPast').value = 3;
          document.getElementById('sCur').value = 22;
          pastDurations = [18, 35, 25];
          break;
        case 'heavy':
          document.getElementById('sPast').value = 6;
          document.getElementById('sCur').value = 55;
          pastDurations = [22, 45, 15, 38, 60, 28];
          break;
        case 'overext':
          document.getElementById('sPast').value = 8;
          document.getElementById('sCur').value = 72;
          pastDurations = [30, 55, 20, 45, 65, 35, 50, 40];
          break;
      }
      render();
    }

    function sim() {
      const btn = document.getElementById('simBtn');
      if (simRunning) {
        clearInterval(simTimer);
        simRunning = false;
        btn.textContent = '▶ Simulate a day';
        return;
      }

      simRunning = true;
      btn.textContent = '■ Stop';

      // Start: 0 past, 0 current
      let phase = 'session'; // 'session' or 'break'
      let sessionNum = 0;
      let curMin = 0;
      let sessionTarget = 20 + Math.random() * 40; // random session length

      document.getElementById('sPast').value = 0;
      document.getElementById('sCur').value = 0;
      pastDurations = [];
      render();

      simTimer = setInterval(() => {
        if (phase === 'session') {
          curMin += 2;
          document.getElementById('sCur').value = Math.min(90, curMin);

          if (curMin >= sessionTarget) {
            // End session
            pastDurations.push(curMin);
            sessionNum++;
            document.getElementById('sPast').value = sessionNum;
            curMin = 0;
            document.getElementById('sCur').value = 0;

            if (sessionNum >= 7) {
              clearInterval(simTimer);
              simRunning = false;
              btn.textContent = '▶ Simulate a day';
            } else {
              phase = 'break';
              sessionTarget = 15 + Math.random() * 50;
            }
          }
        } else {
          // Break: just skip ahead
          phase = 'session';
          curMin = 0;
        }

        render();
      }, 250);
    }

    // Init
    render();
  </script>
</body>
</html>
